<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterMaster — CFA</title>
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="InterMaster">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" id="appleTouchIcon" href="./intermaster-icon.svg">
<link rel="icon" id="dynamicFavicon" href="">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161820;
  --surface2: #1e2028;
  --border: #2a2d3a;
  --accent: #4f8ef7;
  --accent2: #a78bfa;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --orange: #fb923c;
  --text: #e8eaf0;
  --muted: #6b7280;
  --superadmin: #a78bfa;
  --directeur: #4f8ef7;
  --agent: #34d399;
  --operateur: #fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.syne{font-family:'Syne',sans-serif}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.loader-logo{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;letter-spacing:-2px}
.loader-logo span{color:var(--accent)}
.loader-bar{width:200px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.loader-bar::after{content:'';display:block;height:100%;width:40%;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:loadbar 1.2s ease-in-out infinite}
@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(350%)};}

/* ── LOGIN ── */
#loginPage{display:none;min-height:100vh;align-items:center;justify-content:center;position:relative;overflow:hidden}
#loginPage.active{display:flex}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(79,142,247,0.12) 0%,transparent 70%)}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:0.3}
.login-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:420px;box-shadow:0 40px 80px rgba(0,0,0,0.5)}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo h1{font-size:2rem;font-weight:800;letter-spacing:-1px}
.login-logo h1 span{color:var(--accent)}
.login-logo p{color:var(--muted);font-size:.85rem;margin-top:4px}
.field{margin-bottom:20px}
.field label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--surface)}
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3b7ae8;transform:translateY(-1px)}
.login-error{color:var(--red);font-size:.82rem;text-align:center;margin-top:12px;min-height:20px}

/* ── LAYOUT ── */
#app{display:none;min-height:100vh}
#app.active{display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:20px}
.logo-sm{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-1px}
.logo-sm span{color:var(--accent)}
.role-badge{padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.role-superadmin{background:rgba(167,139,250,.15);color:var(--superadmin);border:1px solid rgba(167,139,250,.3)}
.role-directeur{background:rgba(79,142,247,.15);color:var(--directeur);border:1px solid rgba(79,142,247,.3)}
.role-agent{background:rgba(52,211,153,.15);color:var(--agent);border:1px solid rgba(52,211,153,.3)}
.role-operateur{background:rgba(251,191,36,.15);color:var(--operateur);border:1px solid rgba(251,191,36,.3)}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-info{font-size:.85rem;color:var(--muted)}
.btn-sm{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s}
.btn-sm:hover{background:var(--surface2);border-color:var(--accent)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}

.main-layout{display:flex;flex:1;min-height:calc(100vh - 60px)}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:20px 12px;flex-shrink:0}
.nav-section{margin-bottom:24px}
.nav-section-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 8px;margin-bottom:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:.88rem;color:var(--muted);transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(79,142,247,.12);color:var(--accent)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.content{flex:1;padding:28px;overflow-y:auto}

/* ── PAGE TITLES ── */
.page-header{margin-bottom:28px}
.page-header h2{font-size:1.6rem;font-weight:800;letter-spacing:-.5px}
.page-header p{color:var(--muted);font-size:.88rem;margin-top:4px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}

/* ── TABLES ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th{text-align:left;padding:10px 14px;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid rgba(42,45,58,.5)}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.badge-pending{background:rgba(251,191,36,.15);color:var(--yellow)}
.badge-accepted{background:rgba(52,211,153,.15);color:var(--green)}
.badge-refused{background:rgba(248,113,113,.15);color:var(--red)}
.badge-done{background:rgba(52,211,153,.2);color:var(--green)}
.badge-notdone{background:rgba(107,114,128,.15);color:var(--muted)}

/* ── FORMS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:.78rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.form-group input,.form-group select,.form-group textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{min-height:90px;resize:vertical}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-action{padding:9px 20px;border-radius:8px;border:none;font-family:'Syne',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .15s}
.btn-action.primary{background:var(--accent);color:#fff}
.btn-action.primary:hover{background:#3b7ae8}
.btn-action.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-action.secondary:hover{border-color:var(--accent)}
.btn-action.danger{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-action.danger:hover{background:rgba(248,113,113,.2)}
.btn-action.success{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.btn-action.success:hover{background:rgba(52,211,153,.2)}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:24px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;line-height:1}
.modal-close:hover{color:var(--text)}

/* ── CALENDAR ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-month{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem}
.cal-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;padding:8px 0;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.cal-day{min-height:80px;background:var(--surface2);border-radius:8px;padding:6px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.cal-day:hover{border-color:var(--accent)}
.cal-day.other-month{opacity:.35}
.cal-day.today{border-color:var(--accent)}
.cal-day-num{font-size:.78rem;font-weight:600;margin-bottom:4px}
.cal-event{font-size:.68rem;padding:2px 5px;border-radius:4px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
.cal-event.pending{background:rgba(251,191,36,.2);color:var(--yellow)}
.cal-event.accepted{background:rgba(79,142,247,.2);color:var(--accent)}
.cal-event.done{background:rgba(52,211,153,.2);color:var(--green)}
.cal-event.refused{background:rgba(248,113,113,.15);color:var(--red)}
.cal-legend{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
.cal-legend-dot{width:10px;height:10px;border-radius:3px}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;line-height:1}
.stat-label{font-size:.78rem;color:var(--muted);margin-top:4px}

/* ── LOGS ── */
.log-entry{padding:10px 14px;border-radius:8px;background:var(--surface2);margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;font-size:.84rem}
.log-time{color:var(--muted);flex-shrink:0;font-size:.78rem}
.log-icon{flex-shrink:0;width:20px;height:20px}

/* ── PHOTO UPLOAD ── */
.photo-drop{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;color:var(--muted);cursor:pointer;transition:border-color .2s;font-size:.85rem}
.photo-drop:hover{border-color:var(--accent)}
.photo-drop img{max-width:100%;max-height:120px;border-radius:8px;margin-top:10px}

/* ── REQUEST CARD ── */
.request-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;transition:border-color .2s}
.request-card:hover{border-color:var(--border)}
.request-meta{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.request-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:6px}
.request-desc{font-size:.85rem;color:var(--muted);line-height:1.5}
.request-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;flex-wrap:gap}
.request-actions{display:flex;gap:8px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none}
  .form-grid{grid-template-columns:1fr}
  .cal-day{min-height:50px}
  .cal-event{display:none}
}

/* ── ANIMATIONS ── */
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-size:.88rem;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:9999;transform:translateY(20px);opacity:0;transition:all .3s;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--accent);color:var(--accent)}

.sep{border:none;border-top:1px solid var(--border);margin:20px 0}
.install-banner{position:fixed;left:16px;right:16px;bottom:16px;z-index:120;display:none;align-items:flex-start;gap:14px;padding:16px 18px;border-radius:18px;border:1px solid rgba(79,142,247,.28);background:linear-gradient(135deg,rgba(22,24,32,.96),rgba(30,32,40,.96));box-shadow:0 18px 40px rgba(0,0,0,.32);backdrop-filter:blur(10px)}
.install-banner.show{display:flex}
.install-banner-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(79,142,247,.14);color:var(--accent);flex-shrink:0}
.install-banner-icon svg{width:22px;height:22px}
.install-banner-content{flex:1}
.install-banner-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:4px}
.install-banner-text{font-size:.86rem;color:var(--muted);line-height:1.45}
.install-banner-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
.install-banner-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;line-height:1;padding:4px 0 0}
.install-banner-close:hover{color:var(--text)}
.btn.is-loading,.btn-action.is-loading,.btn-sm.is-loading,.cal-btn.is-loading{pointer-events:none;opacity:.85}
.btn.is-loading{color:transparent;position:relative;overflow:hidden}
.btn.is-loading::before,.skeleton-block{background:linear-gradient(90deg,rgba(255,255,255,.05) 20%,rgba(255,255,255,.16) 50%,rgba(255,255,255,.05) 80%);background-size:220% 100%;animation:shimmer 1.15s linear infinite}
.btn.is-loading::before{content:'';position:absolute;inset:0}
.btn.is-loading::after{content:'Connexion...';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff}
.login-card.is-submitting .field input,.login-card.is-submitting .field select{opacity:.72}
.burger-btn{display:none;width:42px;height:42px;padding:0;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);align-items:center;justify-content:center;cursor:pointer}
.burger-btn svg{width:18px;height:18px}
.sidebar-overlay{display:none;position:fixed;inset:60px 0 0 0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:89}
.badge-saving{background:rgba(79,142,247,.14);color:var(--accent)}
.optimistic-item{position:relative}
.optimistic-item::after{content:'Sync...';position:absolute;top:12px;right:14px;font-size:.68rem;color:var(--accent)}
.optimistic-dim{opacity:.55}
.status-pill{display:inline-flex;align-items:center;gap:6px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 0 0 currentColor;animation:pulseDot 1.2s infinite}
.cal-mobile-list{display:none;margin-top:18px}
.cal-mobile-event{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.cal-mobile-event-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.cal-mobile-event-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700}
.cal-mobile-event-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:.78rem;color:var(--muted)}
.cal-day-markers{display:none}
.cal-dot-row{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:6px;flex-wrap:wrap}
.cal-dot{width:7px;height:7px;border-radius:999px}
.cal-dot.pending{background:var(--yellow)}
.cal-dot.accepted{background:var(--accent)}
.cal-dot.done{background:var(--green)}
.cal-dot.refused{background:var(--red)}
.cal-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:rgba(79,142,247,.14);color:var(--accent);font-size:.68rem;font-weight:700;margin-top:6px}
.cal-day.has-events{border-color:rgba(79,142,247,.28)}
.cal-day.selected{outline:2px solid rgba(79,142,247,.45);border-color:var(--accent)}
.cal-day-panel{display:none;margin-top:16px;padding:16px;border-radius:14px;background:var(--surface2);border:1px solid var(--border)}
.cal-day-panel.open{display:block}
.cal-day-panel-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.cal-day-panel-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700}
.perf-list{display:grid;gap:10px}
.perf-row{display:grid;grid-template-columns:140px 1fr auto;gap:12px;align-items:center}
.perf-label{font-size:.85rem;color:var(--text)}
.perf-bar{height:10px;border-radius:999px;background:var(--surface2);overflow:hidden;border:1px solid var(--border)}
.perf-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:999px}
.perf-value{font-family:'Syne',sans-serif;font-weight:700}
.page-skeleton{display:grid;gap:14px}
.skeleton-card{height:108px;border-radius:14px;border:1px solid var(--border);background:var(--surface);padding:18px}
@media(max-width:1024px){.topbar{padding:0 16px}.content{padding:20px}}
@media(max-width:768px){
  .burger-btn{display:flex}
  .sidebar{display:block;position:fixed;top:60px;left:0;bottom:0;width:min(82vw,280px);transform:translateX(-100%);transition:transform .22s ease;z-index:90;box-shadow:24px 0 40px rgba(0,0,0,.35)}
  body.menu-open .sidebar{transform:translateX(0)}
  .sidebar-overlay{display:block;opacity:0;pointer-events:none;transition:opacity .2s ease}
  body.menu-open .sidebar-overlay{opacity:1;pointer-events:auto}
  .topbar-left{gap:12px}
  .topbar-right .user-info{display:none}
  .content{padding:16px}
  .card{padding:18px}
  .login-card{width:min(100%,420px);padding:34px 22px}
  .form-grid{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .table-wrap{overflow:visible}
  table,thead,tbody,tr,th,td{display:block;width:100%}
  thead{display:none}
  tr{padding:14px 0;border-bottom:1px solid rgba(42,45,58,.5)}
  td{border:none;padding:6px 0}
  td::before{content:attr(data-label);display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
  .cal-header{flex-direction:column;align-items:flex-start;gap:12px}
  .cal-grid{gap:6px}
  .cal-day{min-height:62px;padding:8px 4px}
  .cal-day-num{text-align:center;margin-bottom:0}
  .cal-event,.cal-more{display:none}
  .cal-day-markers,.cal-day-panel{display:block}
  .cal-mobile-list{display:none}
  .perf-row{grid-template-columns:1fr;gap:6px}
  .modal{padding:24px 18px}
}
@media(max-width:560px){
  .topbar-right .btn-sm:first-of-type{display:none}
  .stats-row{grid-template-columns:1fr}
  .request-actions,.form-actions{flex-direction:column}
  .request-actions .btn-action,.form-actions .btn-action{width:100%}
  .install-banner{left:10px;right:10px;bottom:10px;padding:14px}
}

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG — Remplacez par votre URL GAS Master déployée
// ═══════════════════════════════════════════════════════
const GAS_MASTER_URL = 'https://script.google.com/macros/s/AKfycbwGH16K8WztuHWRp-Di5qj79MyAPhRNVYeRLrNDkjiR0OM0LwguRsXC9DLsCRa4X4lH/exec';

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let currentUser = null; // {nom, email, role, webappUrl, entreprise}
let clientGAS = null;   // URL du GAS client
let calendarDate = new Date();
let selectedCalendarDate = '';
let allTasks = [];
let allRequests = [];

let deferredInstallPrompt = null;
let autoSyncTimer = null;
let syncInFlight = false;
const AUTO_SYNC_VISIBLE_MS = 5000;
const AUTO_SYNC_HIDDEN_MS = 20000;
const LIVE_SYNC_PAGES = new Set(['dashboard', 'calendar', 'requests', 'myrequests', 'mytasks']);
const SYNC_TASK_FIELDS = ['id', 'titre', 'site', 'categorie', 'description', 'budget', 'date', 'photoUrl', 'agentNom', 'agentEmail', 'statut', 'refusRaison', 'operateurNom', 'operateurEmail'];
const store = {
  users: [],
  categories: [],
  sites: [],
  logs: [],
  calendarTasks: [],
  requestTasks: [],
  myRequests: [],
  myTasks: []
};
function getUserRole() {
  return (
    currentUser?.role ||
    currentUser?.["rôle"] ||
    ""
  ).toString().toLowerCase().trim();
}
// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  registerPwaHelpers();
  setTimeout(() => {
    document.getElementById('loader').style.display = 'none';
    const saved = sessionStorage.getItem('intermaster_user');
    if (saved) {
      currentUser = JSON.parse(saved);

// compat ancienne session
if (!currentUser.role && currentUser["rôle"]) {
  currentUser.role = currentUser["rôle"];
}
      clientGAS = currentUser.webappUrl;
      launchApp();
    } else {
      document.getElementById('loginPage').classList.add('active');
    }
  }, 1200);
});

// ═══════════════════════════════════════════════════════
//  LOGIN FLOW
// ═══════════════════════════════════════════════════════
let loginMatches = [];
function clone(value) {
  return JSON.parse(JSON.stringify(value));
}
function ensureTaskFlags(task) {
  if (!task) return task;
  return {...task, _optimistic: !!task._optimistic, _pendingDelete: !!task._pendingDelete};
}
function mergeServerTasksWithLocal(serverTasks = [], localTasks = []) {
  const localMap = new Map(localTasks.map(t => [t.id, t]));

  const merged = serverTasks
    .filter(serverTask => {
      const local = localMap.get(serverTask.id);

      // empêche le retour visuel d’une suppression en attente
      if (local?._pendingDelete) {
        return false;
      }

      return true;
    })
    .map(serverTask => {
      const local = localMap.get(serverTask.id);

      // garde la version locale tant que sync pas terminée
      if (local?._optimistic) {
        return local;
      }

      return ensureTaskFlags(serverTask);
    });

  // conserve les créations locales pas encore sync
  localTasks.forEach(local => {
    const exists = merged.some(t => t.id === local.id);

    if (!exists && local._optimistic && !local._pendingDelete) {
      merged.push(local);
    }
  });

  return merged;
}
function updateTaskCollections(id, updater) {
  ['calendarTasks','requestTasks','myRequests','myTasks'].forEach(key => {
    store[key] = store[key].map(task => task.id === id ? ensureTaskFlags(updater({...task})) : task).filter(Boolean);
  });
}
function refreshAllTasks() {
  allTasks = [...store.calendarTasks, ...store.requestTasks, ...store.myRequests, ...store.myTasks]
    .filter((task, index, arr) => arr.findIndex(t => t.id === task.id) === index);
}
function replaceSnapshot(snapshot) {
  Object.keys(snapshot).forEach(key => {
    store[key] = clone(snapshot[key]);
  });
  refreshAllTasks();
}
function buildTaskSignature(tasks = []) {
  return JSON.stringify(
    tasks.map(task => {
      const normalized = {};
      SYNC_TASK_FIELDS.forEach(field => normalized[field] = task?.[field] ?? '');
      return normalized;
    })
  );
}
function pad2(value) {
  return String(value).padStart(2, '0');
}
function isLikelyIsoDate(value='') {
  return /^\d{4}-\d{2}-\d{2}$/.test(String(value).trim());
}
function parseLooseDate(value) {
  if (value == null || value === '') return null;
  if (value instanceof Date && !Number.isNaN(value.getTime())) return value;
  if (typeof value === 'number') {
    const numericDate = new Date(value);
    return Number.isNaN(numericDate.getTime()) ? null : numericDate;
  }
  const raw = String(value).trim();
  if (!raw) return null;
  if (isLikelyIsoDate(raw)) {
    const [year, month, day] = raw.split('-').map(Number);
    return new Date(year, month - 1, day);
  }
  const frMatch = raw.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{4})$/);
  if (frMatch) {
    const [, day, month, year] = frMatch.map(Number);
    return new Date(year, month - 1, day);
  }
  const parsed = new Date(raw);
  return Number.isNaN(parsed.getTime()) ? null : parsed;
}
function normalizeLogDateTime(dateValue, timeValue) {
  const parsedDate = parseLooseDate(dateValue);
  const timeRaw = timeValue == null ? '' : String(timeValue).trim();
  let parsedTime = null;
  if (timeValue instanceof Date && !Number.isNaN(timeValue.getTime())) {
    parsedTime = timeValue;
  } else if (timeRaw && !/^\d{1,2}:\d{2}(:\d{2})?$/.test(timeRaw)) {
    const maybeDateTime = parseLooseDate(timeRaw);
    if (maybeDateTime) parsedTime = maybeDateTime;
  }

  const baseDate = parsedTime || parsedDate;
  let dateLabel = dateValue == null ? '' : String(dateValue).trim();
  let timeLabel = timeRaw;

  if (parsedDate) {
    dateLabel = parsedDate.toLocaleDateString('fr-FR', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric'
    });
  } else if (parsedTime) {
    dateLabel = parsedTime.toLocaleDateString('fr-FR', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric'
    });
  }

  if (parsedTime) {
    timeLabel = `${pad2(parsedTime.getHours())}:${pad2(parsedTime.getMinutes())}:${pad2(parsedTime.getSeconds())}`;
  } else if (baseDate && !timeRaw) {
    timeLabel = `${pad2(baseDate.getHours())}:${pad2(baseDate.getMinutes())}:${pad2(baseDate.getSeconds())}`;
  } else if (/^\d{1,2}:\d{2}$/.test(timeRaw)) {
    const [hours, minutes] = timeRaw.split(':');
    timeLabel = `${pad2(hours)}:${pad2(minutes)}:00`;
  } else if (!/^\d{1,2}:\d{2}:\d{2}$/.test(timeRaw)) {
    timeLabel = '';
  }

  return [dateLabel, timeLabel].filter(Boolean).join(' ').trim();
}
function getCurrentPageSignature(page = currentPage) {
  if (page === 'dashboard' || page === 'requests') return buildTaskSignature(store.requestTasks);
  if (page === 'calendar') return buildTaskSignature(store.calendarTasks);
  if (page === 'myrequests') return buildTaskSignature(store.myRequests);
  if (page === 'mytasks') return buildTaskSignature(store.myTasks);
  return '';
}
async function refreshPageStore(page = currentPage) {
  if (page === 'dashboard' || page === 'requests') {
    const res = await callClient('getTasks', {
      role: 'directeur',
      email: currentUser.email
    });

    store.requestTasks = mergeServerTasksWithLocal(
      res.tasks || [],
      store.requestTasks
    );
    return;
  }

  if (page === 'calendar') {
    const res = await callClient('getTasks', {
      role: getUserRole(),
      email: currentUser.email
    });

    store.calendarTasks = mergeServerTasksWithLocal(
      res.tasks || [],
      store.calendarTasks
    );
    return;
  }

  if (page === 'myrequests') {
    const res = await callClient('getMyTasks', {
      email: currentUser.email
    });

    store.myRequests = mergeServerTasksWithLocal(
      res.tasks || [],
      store.myRequests
    );
    return;
  }

  if (page === 'mytasks') {
    const res = await callClient('getTasks', {
      role: 'operateur',
      email: currentUser.email
    });

    store.myTasks = mergeServerTasksWithLocal(
      res.tasks || [],
      store.myTasks
    );
  }
}
function tableCell(label, content) {
  return `<td data-label="${label}">${content}</td>`;
}
function statusBadge(task) {
  if (task._optimistic) {
    return `<span class="badge badge-saving"><span class="status-pill"><span class="sync-dot"></span>Sync...</span></span>`;
  }
  const variant = task.statut === 'waiting' ? 'pending' : task.statut;
  return `<span class="badge badge-${variant}">${task.statut}</span>`;
}
function requestCardClass(task) {
  return `request-card fade-in${task._optimistic ? ' optimistic-item' : ''}${task._pendingDelete ? ' optimistic-dim' : ''}`;
}
function skeletonPage(count=3) {
  return `<div class="page-skeleton">${Array.from({length:count}).map(() => `
    <div class="skeleton-card">
      <div class="skeleton-block" style="height:18px;border-radius:10px;width:38%"></div>
      <div class="skeleton-block" style="height:18px;border-radius:10px;margin-top:14px"></div>
      <div class="skeleton-block" style="height:18px;border-radius:10px;margin-top:10px;width:72%"></div>
    </div>`).join('')}</div>`;
}
function rerenderCurrentPage() {
  const pages = {
    calendar: renderCalendar,
    users: renderUsers,
    categories: renderCategories,
    sites: renderSites,
    logs: renderLogs,
    requests: renderRequests,
    newrequest: renderNewRequest,
    myrequests: renderMyRequests,
    mytasks: renderMyTasks,
  };
  const fn = pages[currentPage];
  if (fn) fn(true);
}
async function runOptimisticMutation({snapshotKeys, apply, request, successMessage, errorMessage, onSuccess}) {
  const snapshot = {};
  snapshotKeys.forEach(key => snapshot[key] = clone(store[key]));
  apply();
  refreshAllTasks();
  rerenderCurrentPage();
  if (successMessage) showToast(successMessage, 'success');
  try {
    const res = await request();
    snapshotKeys.forEach(key => {
      store[key] = store[key].map(item => item && item._optimistic ? {...item, _optimistic:false, _pendingDelete:false} : item).filter(Boolean);
    });
    if (onSuccess) await onSuccess(res);
    refreshAllTasks();
    rerenderCurrentPage();
    return res;
  } catch (error) {
    replaceSnapshot(snapshot);
    rerenderCurrentPage();
    showToast(errorMessage || 'Erreur de synchronisation', 'error');
    console.error(error);
    throw error;
  }
}
function toggleMobileMenu() {
  document.body.classList.toggle('menu-open');
}
function closeMobileMenu() {
  document.body.classList.remove('menu-open');
}
function getRoleAccent(role='') {
  const colors = {
    superadmin: '#a78bfa',
    directeur: '#4f8ef7',
    agent: '#34d399',
    operateur: '#fbbf24'
  };
  return colors[role] || '#4f8ef7';
}
function buildInterMasterIcon(color='#4f8ef7', label='IM') {
  const safeLabel = (label || 'IM').slice(0,2).toUpperCase();
  return `data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="${color}"/><stop offset="1" stop-color="#0d0f14"/></linearGradient></defs><rect width="64" height="64" rx="18" fill="#11141c"/><rect x="5" y="5" width="54" height="54" rx="15" fill="url(#g)" opacity=".22"/><path d="M18 20h8v24h-8zM30 20h6l10 13V20h8v24h-6L38 31v13h-8z" fill="${color}"/><text x="46" y="53" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#f3f4f6">${safeLabel}</text></svg>`)}`;
}
function applyContextBranding() {
  const role = getUserRole();
  const roleCode = ({superadmin:'SA',directeur:'DI',agent:'AG',operateur:'OP'})[role] || 'IM';
  const icon = buildInterMasterIcon(getRoleAccent(role), roleCode);
  const favicon = document.getElementById('dynamicFavicon');
  const appleIcon = document.getElementById('appleTouchIcon');
  if (favicon) favicon.href = icon;
  if (appleIcon) appleIcon.href = icon;
}
function isIosDevice() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function dismissInstallBanner() {
  sessionStorage.setItem('intermaster_install_banner_dismissed', '1');
  const banner = document.getElementById('installBanner');
  if (banner) banner.classList.remove('show');
}
function buildInstallBanner(text, actionsHtml='') {
  document.getElementById('installBannerText').textContent = text;
  document.getElementById('installBannerActions').innerHTML = actionsHtml;
  document.getElementById('installBanner').classList.add('show');
}
async function handleInstallApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  dismissInstallBanner();
}
function maybeShowInstallBanner() {
  if (sessionStorage.getItem('intermaster_install_banner_dismissed') === '1' || isStandalone()) return;
  if (deferredInstallPrompt) {
    buildInstallBanner(
      'Installez InterMaster pour l ouvrir plus vite, garder l app en plein ecran et l utiliser comme une vraie application.',
      `<button class="btn-action primary" onclick="handleInstallApp()">Installer</button><button class="btn-action secondary" onclick="dismissInstallBanner()">Plus tard</button>`
    );
    return;
  }
  if (isIosDevice()) {
    buildInstallBanner(
      'Sur iPhone, ouvrez le menu Partager de Safari puis choisissez "Sur l ecran d accueil" pour installer InterMaster.',
      `<button class="btn-action secondary" onclick="dismissInstallBanner()">Compris</button>`
    );
  }
}
function initInstallPrompt() {
  window.addEventListener('beforeinstallprompt', (event) => {
    event.preventDefault();
    deferredInstallPrompt = event;
    maybeShowInstallBanner();
  });
  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    dismissInstallBanner();
  });
}
function registerPwaHelpers() {
  applyContextBranding();
  initInstallPrompt();
  maybeShowInstallBanner();
  if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {

    // 🔥 détecte une nouvelle version du SW
    reg.onupdatefound = () => {
      const newWorker = reg.installing;

      newWorker.onstatechange = () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {

          console.log('Nouvelle version détectée');

          // 👉 recharge automatique de l'app
          window.location.reload();
        }
      };
    };

  }).catch(() => {});
}
}

async function handleLogin() {
  if (loginPending) return;
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  const profileSel = document.getElementById('loginProfile');
  const errEl = document.getElementById('loginError');
  const loginCard = document.querySelector('.login-card');
  const loginBtn = document.querySelector('#loginPage .btn-primary');
  errEl.textContent = '';

  if (!email || !pwd) { errEl.textContent = 'Veuillez remplir tous les champs.'; return; }
  loginPending = true;
  loginCard.classList.add('is-submitting');
  loginBtn.classList.add('is-loading');

  // Si profil déjà affiché → connexion directe
  if (document.getElementById('profileField').style.display !== 'none' && loginMatches.length) {
    const chosen = loginMatches[parseInt(profileSel.value)];
    currentUser = chosen;
    clientGAS = chosen.webappUrl;
    sessionStorage.setItem('intermaster_user', JSON.stringify(currentUser));
    launchApp();
    loginPending = false;
    return;
  }

  // Appel GAS master
  try {
    const res = await callGAS(GAS_MASTER_URL, 'authenticate', {email, password: pwd});
    if (res.success) {
      loginMatches = res.users;
      if (loginMatches.length === 1) {
        currentUser = loginMatches[0];
        clientGAS = currentUser.webappUrl;
        sessionStorage.setItem('intermaster_user', JSON.stringify(currentUser));
        launchApp();
      } else {
        // Plusieurs profils → montrer select
        profileSel.innerHTML = loginMatches.map((u,i) => {
  const role = (u.role || u["rôle"] || "").toString().trim().toLowerCase();
  return `<option value="${i}">${role} — ${u.entreprise}</option>`;
}).join('');
        document.getElementById('profileField').style.display = 'block';
      }
    } else {
      errEl.textContent = res.message || 'Identifiants incorrects.';
    }
  } catch(e) {
    errEl.textContent = 'Erreur de connexion au serveur.';
    console.error(e);
  } finally {
    loginPending = false;
    loginCard.classList.remove('is-submitting');
    loginBtn.classList.remove('is-loading');
  }
}

function logout() {
  stopAutoSync();
  sessionStorage.removeItem('intermaster_user');
  location.reload();
}

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
function launchApp() {
  document.getElementById('loginPage').classList.remove('active');
  document.getElementById('app').classList.add('active');

  // Topbar
  const role = getUserRole();
  document.getElementById('topUserInfo').textContent = `${currentUser.nom} · ${currentUser.entreprise}`;
  const badge = document.getElementById('topRoleBadge');
  badge.textContent = role;
  badge.className = `role-badge role-${role}`;
  applyContextBranding();
  maybeShowInstallBanner();

  buildSidebar();
  startAutoSync();
  showPage(role === 'directeur' ? 'dashboard' : 'calendar');
}

function stopAutoSync() {
  if (autoSyncTimer) {
    clearTimeout(autoSyncTimer);
    autoSyncTimer = null;
  }
}

function scheduleAutoSync(delay = document.hidden ? AUTO_SYNC_HIDDEN_MS : AUTO_SYNC_VISIBLE_MS) {
  stopAutoSync();
  autoSyncTimer = setTimeout(() => {
    syncCurrentPage({ silent: true }).finally(() => scheduleAutoSync());
  }, delay);
}

async function syncCurrentPage({ silent = true, force = false } = {}) {
  if (!currentUser || syncInFlight) return;
  if (!force && !LIVE_SYNC_PAGES.has(currentPage)) return;
  if (document.getElementById('loginPage')?.classList.contains('active')) return;
  if (document.getElementById('modalOverlay')?.classList.contains('open')) return;
  if (!LIVE_SYNC_PAGES.has(currentPage)) return;
  syncInFlight = true;
  try {
    const before = getCurrentPageSignature(currentPage);
    await refreshPageStore(currentPage);
    refreshAllTasks();
    const after = getCurrentPageSignature(currentPage);
    if (before !== after) {
      rerenderCurrentPage();
      if (!silent) showToast('Mise a jour en direct', 'info');
    }
  } catch (error) {
    console.error('Auto sync failed', error);
  } finally {
    syncInFlight = false;
  }
}

function startAutoSync() {
  stopAutoSync();
  document.removeEventListener('visibilitychange', handleVisibilitySync);
  window.removeEventListener('focus', handleFocusSync);
  window.removeEventListener('online', handleOnlineSync);
  document.addEventListener('visibilitychange', handleVisibilitySync);
  window.addEventListener('focus', handleFocusSync);
  window.addEventListener('online', handleOnlineSync);
  scheduleAutoSync();
}

function handleVisibilitySync() {
  if (document.hidden) {
    scheduleAutoSync(AUTO_SYNC_HIDDEN_MS);
    return;
  }
  syncCurrentPage({ force: true }).finally(() => scheduleAutoSync(AUTO_SYNC_VISIBLE_MS));
}

function handleFocusSync() {
  syncCurrentPage({ force: true }).finally(() => scheduleAutoSync());
}

function handleOnlineSync() {
  syncCurrentPage({ force: true, silent: false }).finally(() => scheduleAutoSync());
}

//  GAS CALL HELPER
// ═══════════════════════════════════════════════════════
function callGAS(url, action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 1000);

    window[callbackName] = function (data) {
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    const query = new URLSearchParams({
      action,
      ...params,
      callback: callbackName
    });

    const script = document.createElement('script');
    script.src = `${url}?${query.toString()}`;

    script.onerror = () => {
      reject(new Error('Erreur appel GAS : ' + action));
      delete window[callbackName];
      script.remove();
    };

    document.body.appendChild(script);
  });
}
async function compressImage(file, maxWidth = 1200, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();

      img.onload = () => {
        const ratio = img.width > maxWidth ? maxWidth / img.width : 1;
        const canvas = document.createElement('canvas');

        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        resolve(canvas.toDataURL('image/jpeg', quality));
      };

      img.onerror = reject;
      img.src = e.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function callClientJSONP(action, params = {}) {
  // ✅ POST pour createTask (photo)
  // ✅ JSONP pour le reste
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 1000);

    const query = new URLSearchParams({
      action,
      callback: callbackName,
      ...params
    });

    const script = document.createElement('script');

    window[callbackName] = (data) => {
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    script.onerror = () => {
      reject(new Error('Erreur appel GAS : ' + action));
      delete window[callbackName];
      script.remove();
    };

    script.src = `${clientGAS}?${query.toString()}`;
    document.body.appendChild(script);
  });
}

async function callClientPostOpaque(action, params = {}) {
  const formData = new URLSearchParams();
  formData.append('action', action);

  Object.entries(params).forEach(([key, value]) => {
    formData.append(key, value ?? '');
  });

  await fetch(clientGAS, {
    method: 'POST',
    mode: 'no-cors',
    body: formData
  });

  return {success:true, opaque:true};
}

async function callClient(action, params = {}) {
  const hasPhotoPayload = action === 'createTask' && params.photoData;
  const res = hasPhotoPayload
    ? await callClientPostOpaque(action, params)
    : await callClientJSONP(action, params);

  if (res && res.success === false) {
    throw new Error(res.message || 'Erreur backend');
  }

  return res;
}

function drawCalendar() {
  const label = document.getElementById('calMonthLabel');
  if (!label) return;
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  label.textContent = `${months[calendarDate.getMonth()]} ${calendarDate.getFullYear()}`;

  const year = calendarDate.getFullYear(), month = calendarDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date();
  const offset = firstDay === 0 ? 6 : firstDay-1;
  if (!selectedCalendarDate) {
    const firstTask = allTasks.find(t => (t.date || '').startsWith(`${year}-${String(month+1).padStart(2,'0')}-`));
    if (firstTask) selectedCalendarDate = firstTask.date;
  }

  let html = '<div class="cal-grid">';
  ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(d => html += `<div class="cal-day-name">${d}</div>`);

  for (let i=0; i<offset; i++) {
    const d = new Date(year, month, 1-offset+i);
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d.getDate()}</div></div>`;
  }
  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getDate()===d && today.getMonth()===month && today.getFullYear()===year;
    const dayTasks = allTasks.filter(t => t.date === dateStr);
    const dotHtml = dayTasks.length ? `
      <div class="cal-day-markers">
        <div class="cal-dot-row">
          ${dayTasks.slice(0,3).map(t => `<span class="cal-dot ${t.statut.toLowerCase()==='waiting'?'pending':t.statut.toLowerCase()}"></span>`).join('')}
        </div>
        <div class="cal-dot-row">${dayTasks.length ? `<span class="cal-count">${dayTasks.length}</span>` : ''}</div>
      </div>` : '';
    const evHtml = dayTasks.slice(0,3).map(t =>
      `<div class="cal-event ${t.statut.toLowerCase()}" onclick="showTaskDetail('${t.id}')" title="${t.titre}">${t.titre}</div>`
    ).join('');
    const more = dayTasks.length>3 ? `<div class="cal-more" style="font-size:.65rem;color:var(--muted)">+${dayTasks.length-3}</div>` : '';
    const selected = selectedCalendarDate===dateStr ? ' selected' : '';
    const hasEvents = dayTasks.length ? ' has-events' : '';
    html += `<div class="cal-day${isToday?' today':''}${selected}${hasEvents}" onclick="calDayClick('${dateStr}')">
      <div class="cal-day-num">${d}</div>${dotHtml}${evHtml}${more}</div>`;
  }
  const remain = (7 - (offset+daysInMonth)%7) % 7;
  for (let i=1; i<=remain; i++) html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  html += '</div>';
  document.getElementById('calWrapper').innerHTML = html;
  drawCalendarDayPanel(selectedCalendarDate || `${year}-${String(month+1).padStart(2,'0')}-01`);
  drawCalendarMobileAgenda(year, month);
}
function getTasksForDate(dateStr) {
  return allTasks.filter(t => t.date === dateStr);
}
function formatDateLabel(dateStr) {
  if (!dateStr) return '';
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, (m || 1) - 1, d || 1);
  return dt.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
}
function drawCalendarDayPanel(dateStr) {
  const panel = document.getElementById('calDayPanel');
  if (!panel) return;
  const tasks = getTasksForDate(dateStr);
  panel.classList.add('open');
  panel.innerHTML = `
    <div class="cal-day-panel-header">
      <div class="cal-day-panel-title">${formatDateLabel(dateStr)}</div>
      <span class="badge" style="background:var(--surface);color:var(--muted)">${tasks.length} tache(s)</span>
    </div>
    ${tasks.length ? tasks.map(t => `
      <div class="cal-mobile-event${t._optimistic ? ' optimistic-item' : ''}" onclick="showTaskDetail('${t.id}')">
        <div class="cal-mobile-event-head">
          <div class="cal-mobile-event-title">${t.titre}</div>
          ${statusBadge(t)}
        </div>
        <div class="cal-mobile-event-meta">
          <span>${t.site || '-'}</span>
          <span>${t.categorie || '-'}</span>
          <span>${t.agentNom || ''}</span>
        </div>
      </div>`).join('') : `<div style="color:var(--muted)">Aucune intervention ce jour.</div>`}
  `;
}
function drawCalendarMobileAgenda(year, month) {
  const target = document.getElementById('calMobileList');
  if (!target) return;
  const monthTasks = (store.calendarTasks.length ? store.calendarTasks : allTasks)
    .filter(t => {
      const [y, m] = (t.date || '').split('-').map(Number);
      return y === year && m === month + 1;
    })
    .sort((a,b) => (a.date || '').localeCompare(b.date || ''));
  target.innerHTML = monthTasks.length
    ? monthTasks.map(t => `
      <div class="cal-mobile-event${t._optimistic ? ' optimistic-item' : ''}" onclick="showTaskDetail('${t.id}')">
        <div class="cal-mobile-event-head">
          <div class="cal-mobile-event-title">${t.titre}</div>
          ${statusBadge(t)}
        </div>
        <div class="cal-mobile-event-meta">
          <span>${t.date}</span>
          <span>${t.site || '-'}</span>
          <span>${t.categorie || '-'}</span>
        </div>
      </div>`).join('')
    : `<div class="cal-mobile-event" style="color:var(--muted)">Aucune intervention sur ce mois.</div>`;
}

function calPrev() { selectedCalendarDate = ''; calendarDate.setMonth(calendarDate.getMonth()-1); drawCalendar(); }
function calNext() { selectedCalendarDate = ''; calendarDate.setMonth(calendarDate.getMonth()+1); drawCalendar(); }
function calDayClick(date) { selectedCalendarDate = date; drawCalendar(); }

function isDrivePhotoUrl(url = '') {
  return /(^|\/\/)(drive|docs)\.google\.com\//i.test(String(url));
}

function photoHtml(url) {
  if (!url) return '';
  const isDrive = isDrivePhotoUrl(url);
  const src = isDrive ? '' : `src="${url}"`;

  return `
    <div style="margin-top:16px">
      <img
        ${src}
        data-photo-url="${url}"
        data-photo-loaded="${isDrive ? '0' : '1'}"
        style="max-width:100%;max-height:220px;border-radius:10px;display:${isDrive ? 'none' : 'block'};margin-bottom:10px"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
      >
      <div style="display:${isDrive ? 'block' : 'none'};color:var(--muted);font-size:.84rem;margin-bottom:10px">Chargement de la photo...</div>
      <a href="${url}" target="_blank"
         style="color:var(--accent);text-decoration:underline;font-size:.85rem">
         Voir la photo
      </a>
    </div>
  `;
}

async function loadProtectedPhotos() {
  const images = document.querySelectorAll('#modalBody img[data-photo-loaded="0"]');

  for (const img of images) {
    const url = img.dataset.photoUrl;
    const status = img.nextElementSibling;

    try {
      const res = await callClient('getPhotoData', {photoUrl: url});
      if (!res.dataUrl) throw new Error(res.message || 'Photo inaccessible');

      img.src = res.dataUrl;
      img.dataset.photoLoaded = '1';
      img.style.display = 'block';
      if (status) status.style.display = 'none';
    } catch (error) {
      if (status) status.textContent = 'Photo inaccessible. Ouvrez le lien ou verifiez le partage Drive.';
    }
  }
}

function showTaskDetail(id) {
  const task = allTasks.find(t=>t.id===id);
  if (!task) return;
  const role = getUserRole();

  let actions = '';
  if (role==='directeur' && task.statut==='pending') {
    actions = `
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn-action success" onclick="acceptTask('${id}')">✓ Accepter</button>
        <button class="btn-action secondary" onclick="waitTask('${id}')">⏸ Attente</button>
        <button class="btn-action danger" onclick="openRefuseModal('${id}')">✕ Refuser</button>
      </div>`;
  }
  if (role==='operateur' && task.statut==='accepted') {
    actions = `<div style="margin-top:16px"><button class="btn-action success" onclick="markDone('${id}')">✓ Marquer effectué</button></div>`;
  }
  if (role==='operateur' && task.statut==='done') {
    actions = `<div style="margin-top:16px"><button class="btn-action secondary" onclick="markUndone('${id}')">↩ Annuler effectué</button></div>`;
  }
  openModal(`
    <div class="modal-title">${task.titre}</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <span class="badge badge-${task.statut==='pending'?'pending':task.statut==='accepted'?'accepted':task.statut==='done'?'done':'refused'}">${task.statut}</span>
      <span class="badge" style="background:var(--surface2);color:var(--muted)">${task.categorie}</span>
      <span class="badge" style="background:var(--surface2);color:var(--muted)">${task.site}</span>
    </div>
    <div style="font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:12px">${task.description}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:.82rem">
      <div><span style="color:var(--muted)">Date souhaitée :</span> ${task.date}</div>
      <div><span style="color:var(--muted)">Budget estimatif :</span> ${task.budget}€</div>
      <div><span style="color:var(--muted)">Demandé par :</span> ${task.agentNom}</div>
      ${task.operateurNom?`<div><span style="color:var(--muted)">Réalisé par :</span> ${task.operateurNom}</div>`:''}
      ${task.refusRaison?`<div style="grid-column:1/-1;color:var(--red)">Motif de refus : ${task.refusRaison}</div>`:''}
    </div>
    ${photoHtml(task.photoUrl)}
    ${actions}
  `);
  loadProtectedPhotos();
}

function openModal(html) {
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

let toastTimer;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function downloadCSV(csv, filename) {
  const BOM = '\uFEFF';
  const blob = new Blob([BOM + csv], {
    type: 'text/csv;charset=utf-8;'
  });

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

async function purgeCalendar() {
  if (!confirm('Purger toutes les taches effectuees ? Cette action est irreversible.')) return;
  await runOptimisticMutation({
    snapshotKeys: ['calendarTasks','requestTasks','myRequests','myTasks'],
    apply: () => {

        store[key] = store[key].filter(task => task.statut !== 'done');
      });
    },
    request: () => callClient('purgeDoneTasks'),

        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Top opérateurs</div></div>
        ${rankedOperators.length ? `

      return `
        <div class="perf-row">

      </div>

async function submitRequest() {
  const titre = document.getElementById('rqTitre').value.trim();
  const site = document.getElementById('rqSite').value;
  const categorie = document.getElementById('rqCat').value;
  const description = document.getElementById('rqDesc').value.trim();

  const date = document.getElementById('rqDate').value;
  const photoData = document.getElementById('photoDrop').dataset.photoData||'';
  if (!titre||!site||!categorie||!description||!date) { showToast('Veuillez remplir tous les champs obligatoires','error'); return; }
  const optimisticId = 'tmp_' + Date.now();
  const optimisticTask = ensureTaskFlags({id:optimisticId, titre, site, categorie, description, budget, date, photoUrl:photoData, agentNom:currentUser.nom, agentEmail:currentUser.email, statut:'pending', _optimistic:true});
  await runOptimisticMutation({
    snapshotKeys: ['myRequests','calendarTasks','requestTasks'],
    apply: () => {
      store.myRequests.unshift(optimisticTask);
      store.calendarTasks.unshift(optimisticTask);
      store.requestTasks.unshift(optimisticTask);
      currentPage = 'myrequests';
    },
    request: () => callClient('createTask', {titre, site, categorie, description, budget, date, photoData, agentNom: currentUser.nom, agentEmail: currentUser.email}),
    successMessage: 'Demande envoyee',
    errorMessage: 'Impossible d envoyer la demande.',
    onSuccess: (res) => {

      if (realId) ['myRequests','calendarTasks','requestTasks'].forEach(key => { store[key] = store[key].map(task => task.id === optimisticId ? {...task, ...(res.task || {}), id: realId, _optimistic:false} : task); });
      showPage('myrequests');
    }
  });
}

    successMessage: 'Demande supprimée',

  });
}
